<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xoài học toán</title>
    <style>
        /* Sử dụng font chữ hệ thống và tùy chỉnh để trông vui nhộn */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            color: #333;
            background-image: url('https://i.postimg.cc/L4v5CWJM/ironman.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Thêm hiệu ứng đổ bóng và làm đậm chữ để trông nổi bật hơn */
        h1, label, button, input[type="number"], #question, #timer, #score, #results-list li {
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
            font-weight: 500; /* Làm đậm chữ vừa phải */
        }

        #game-container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 90%;
            max-width: 600px;
        }

        h1 {
            color: #ff4081;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        #question {
            font-size: 2.2em;
            margin-bottom: 25px;
            color: #e91e63;
        }

        input[type="number"] {
            padding: 15px;
            font-size: 1.3em;
            border: 2px solid #f06292;
            border-radius: 12px;
            width: 100px;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
        }

        button {
            padding: 15px 30px;
            font-size: 1.3em;
            background-color: #ba68c8;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #9c27b0;
            transform: scale(1.05);
        }

        #result {
            margin-top: 25px;
            font-size: 1.4em;
            font-weight: bold;
        }

        #timer {
            font-size: 1.3em;
            margin-top: 15px;
            color: #7e57c2;
        }

        #settings {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #settings label,
        #settings input {
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        #score {
            font-size: 1.5em;
            font-weight: bold;
            margin-top: 20px;
            color: #ff7043;
        }

        #start-button {
            padding: 15px 30px;
            font-size: 1.3em;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.3s ease;
        }

        #start-button:hover {
            background-color: #388e3c;
            transform: scale(1.05);
        }

        .correct {
            background-color: rgba(76, 175, 80, 0.7);
            color: white;
        }

        .incorrect {
            background-color: rgba(244, 67, 54, 0.7);
            color: white;
        }

        #results-list {
            margin-top: 20px;
            text-align: left;
            width: 100%;
            max-width: 500px;
        }

        #results-list li {
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 8px;
            list-style-type: none;
        }

        #results-list .correct {
            color: #fff;
        }

        #results-list .incorrect {
            color: #fff;
        }

        .icon {
            display: none; /* Hide the icon */
        }

        /* Progress Dots */
        #progress-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .progress-dot {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background-color: #ccc; /* Gray */
            margin: 5px;
        }

        .progress-dot.correct {
            background-color: #4caf50; /* Green */
        }

        .progress-dot.incorrect {
            background-color: #f44336; /* Red */
        }

    </style>
</head>
<body>
    <div id="game-container">
        <h1>
            <span class="icon"></span> Xoài học toán
        </h1>

        <div id="settings">
            <label for="time-limit">Thời gian mỗi câu (mm:ss):</label>
            <input type="text" id="time-limit" placeholder="Ví dụ: 03:00" value="03:00">

            <label for="question-count">Số lượng câu hỏi:</label>
            <input type="number" id="question-count" placeholder="Ví dụ: 10" value="10" min="1">
        </div>

        <button id="start-button" onclick="startGame()">Bắt đầu</button>

        <div id="progress-container"></div>

        <div id="question"></div>
        <input type="number" id="answer" disabled>
        <button onclick="checkAnswer()" disabled>Tiếp</button>
        <div id="result"></div>
        <div id="timer"></div>
        <div id="score"></div>

        <ul id="results-list"></ul>
    </div>

    <script>
        const questionDiv = document.getElementById('question');
        const answerInput = document.getElementById('answer');
        const resultDiv = document.getElementById('result');
        const timerDiv = document.getElementById('timer');
        const timeLimitInput = document.getElementById('time-limit');
        const questionCountInput = document.getElementById('question-count');
        const scoreDiv = document.getElementById('score');
        const startButton = document.getElementById('start-button');
        const checkButton = document.querySelector('button[onclick="checkAnswer()"]');
        const resultsList = document.getElementById('results-list');
        const progressContainer = document.getElementById('progress-container');

        let num1, num2, operator, userAnswer, correctAnswer;
        let timeLeft;
        let timerInterval;
        let currentQuestionIndex = 0;
        let score = 0;
        let totalQuestions;
        let gameStarted = false;
        let questions = [];
        let progressDots = []; // Lưu trữ các chấm tiến trình

        function parseTime(timeString) {
            const parts = timeString.split(':');
            const minutes = parseInt(parts[0]);
            const seconds = parseInt(parts[1]);
            return (minutes * 60) + seconds;
        }

        function startGame() {
            try {
                const totalSeconds = parseTime(timeLimitInput.value);
                if (isNaN(totalSeconds) || totalSeconds <= 0) {
                    alert("Vui lòng nhập thời gian hợp lệ (ví dụ: 01:30)!");
                    return;
                }

                totalQuestions = parseInt(questionCountInput.value);
                if (isNaN(totalQuestions) || totalQuestions <= 0) {
                    alert("Vui lòng nhập số lượng câu hỏi hợp lệ!");
                    return;
                }

                timeLeft = totalSeconds;
                currentQuestionIndex = 0;
                score = 0;
                questions = [];
                scoreDiv.textContent = "";
                resultsList.innerHTML = "";
                gameStarted = false; // Reset gameStarted
                progressContainer.innerHTML = ""; // Clear existing dots
                progressDots = []; // Clear existing dots array


                // Create progress dots
                for (let i = 0; i < totalQuestions; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'progress-dot';
                    progressContainer.appendChild(dot);
                    progressDots.push(dot);
                }

                gameStarted = true;
                answerInput.disabled = false;
                checkButton.disabled = false;
                generateQuestion();

            } catch (error) {
                console.error("Lỗi khi bắt đầu trò chơi:", error);
                alert("Đã xảy ra lỗi khi bắt đầu trò chơi. Vui lòng thử lại sau.");
            }
        }

        function generateQuestion() {
            if (!gameStarted) return;

            if (currentQuestionIndex >= totalQuestions) {
                endGame();
                return;
            }

            try {
                const operations = ['+', '-', 'x'];
                operator = operations[Math.floor(Math.random() * operations.length)];

                if (operator === '+') {
                    num1 = Math.floor(Math.random() * 40);
                    num2 = Math.floor(Math.random() * 40);
                    correctAnswer = num1 + num2;
                } else if (operator === '-') {
                    num1 = Math.floor(Math.random() * 80);
                    num2 = Math.floor(Math.random() * num1);
                    correctAnswer = num1 - num2;
                } else if (operator === 'x') {
                    do {
                        num1 = Math.floor(Math.random() * 16);
                        num2 = Math.floor(Math.random() * 16);
                        correctAnswer = num1 * num2;
                    } while (correctAnswer >= 82);
                }

                questionDiv.textContent = `${num1} ${operator} ${num2} = ? (${currentQuestionIndex + 1}/${totalQuestions})`;
                answerInput.value = '';
                answerInput.focus();
                resetTimer();
            } catch (error) {
                console.error("Lỗi khi tạo câu hỏi:", error);
                alert("Đã xảy ra lỗi khi tạo câu hỏi. Vui lòng thử lại sau.");
            }
        }

        function checkAnswer() {
            if (!gameStarted) return;

            try {
                userAnswer = parseInt(answerInput.value);

                let isCorrect = userAnswer === correctAnswer;

                if (isCorrect) {
                    resultDiv.className = "correct";
                    resultDiv.style.backgroundColor = "rgba(76, 175, 80, 0.7)";
                    score++; // Increment score if answer is correct
                } else {
                    resultDiv.className = "incorrect";
                    resultDiv.style.backgroundColor = "rgba(244, 67, 54, 0.7)";
                }

                questions.push({
                    num1: num1,
                    operator: operator,
                    num2: num2,
                    userAnswer: userAnswer,
                    correctAnswer: correctAnswer,
                    isCorrect: isCorrect
                });

                // Update progress dot color
                if (progressDots[currentQuestionIndex]) {
                    progressDots[currentQuestionIndex].classList.add(isCorrect ? 'correct' : 'incorrect');
                }

                currentQuestionIndex++;
                generateQuestion();

                setTimeout(() => {
                    resultDiv.style.backgroundColor = "transparent";
                    resultDiv.className = "";
                }, 300);

            } catch (error) {
                console.error("Lỗi khi kiểm tra đáp án:", error);
                alert("Đã xảy ra lỗi khi kiểm tra đáp án. Vui lòng thử lại sau.");
            }
        }

       function updateTimer() {
            try {
                const minutes = Math.floor(timeLeft / 60);
                let seconds = timeLeft % 60;
                seconds = seconds < 10 ? '0' + seconds : seconds;

                timerDiv.textContent = `Thời gian còn lại: ${minutes}:${seconds}`;
                timeLeft--;

                if (timeLeft < 0) {
                    clearInterval(timerInterval);
                    resultDiv.style.backgroundColor = "transparent";

                    questions.push({
                        num1: num1,
                        operator: operator,
                        num2: num2,
                        userAnswer: userAnswer,
                        correctAnswer: correctAnswer,
                        isCorrect: false
                    });

                    if (currentQuestionIndex < totalQuestions) {
                        if (progressDots[currentQuestionIndex]) {
                            progressDots[currentQuestionIndex].classList.add('incorrect');
                        }
                    }

                    currentQuestionIndex++;
                    if (currentQuestionIndex < totalQuestions) {
                        generateQuestion();
                    } else {
                        endGame();
                    }
                }
            } catch (error) {
                console.error("Lỗi khi cập nhật thời gian:", error);
            }
        }


        function startTimer() {
            try {
                clearInterval(timerInterval);
                timeLeft = parseTime(timeLimitInput.value);
                updateTimer();
                timerInterval = setInterval(updateTimer, 1000);
            } catch (error) {
                console.error("Lỗi khi bắt đầu đếm giờ:", error);
            }
        }

        function resetTimer() {
            startTimer();
        }

        function endGame() {
             try {
                clearInterval(timerInterval);
                questionDiv.textContent = "Đã hết bài!";
                answerInput.disabled = true;
                checkButton.disabled = true;
                resultDiv.textContent = "";
                timerDiv.textContent = "";
                resultDiv.style.backgroundColor = "transparent";

                scoreDiv.textContent = `Bạn đạt ${score}/${totalQuestions} điểm!`;
                gameStarted = false;

                displayResults();
            } catch (error) {
                console.error("Lỗi khi kết thúc trò chơi:", error);
            }
        }

        function displayResults() {
             try {
                resultsList.innerHTML = ""; // Clear previous results

                questions.forEach((q, index) => {
                    const listItem = document.createElement('li');
                    listItem.textContent = `${index + 1}) ${q.num1} ${q.operator} ${q.num2} = ${q.userAnswer}`;
                    listItem.classList.add(q.isCorrect ? 'correct' : 'incorrect');

                    if (!q.isCorrect) {
                        listItem.textContent += ` (Đúng: ${q.correctAnswer})`;
                    }

                    resultsList.appendChild(listItem);
                });
            } catch (error) {
                console.error("Lỗi khi hiển thị kết quả:", error);
            }
        }
    </script>
</body>
</html>
